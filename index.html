<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>土石流潛勢溪流現勘系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; box-sizing: border-box; }
        button { background-color: #0056b3; color: white; border: none; border-radius: 5px; margin-top: 10px;}
        #status { margin-top: 15px; color: green; font-weight: bold; }
    </style>
</head>
<body>

    <h2>土石流現勘回報表</h2>

    <div class="form-group">
        <label>溪流編號</label>
        <select id="streamId">
            <option value="高市DF019">高市DF019</option>
            <option value="高市DF018">高市DF018</option>
        </select>
    </div>

    <div class="form-group">
        <label>調查員</label>
        <input type="text" id="investigator" placeholder="請輸入姓名">
    </div>

    <div class="form-group">
        <label>GPS 座標 (WGS84)</label>
        <button type="button" onclick="getGPS()">一鍵獲取定位</button>
        <input type="text" id="gpsData" readonly placeholder="尚未獲取座標">
    </div>

    <div class="form-group">
        <label>發生潛勢初估</label>
        <select id="riskLevel">
            <option value="高">高</option>
            <option value="中">中</option>
            <option value="低">低</option>
        </select>
    </div>

    <div class="form-group">
        <label>現場照片拍攝</label>
        <input type="file" id="photoUpload" accept="image/*" capture="environment">
    </div>

    <button type="button" onclick="submitForm()">送出調查資料</button>
    <div id="status"></div>

    <script>
        // 你的 Google Apps Script 部署網址 (Web App URL)
        const API_URL = "https://script.google.com/macros/s/你的_GAS_網址/exec";

        let lat = "", lng = "";

        // 1. 獲取 GPS 座標
        function getGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    lat = position.coords.latitude;
                    lng = position.coords.longitude;
                    document.getElementById("gpsData").value = `${lat}, ${lng}`;
                }, () => {
                    alert("無法獲取定位，請確認手機權限。");
                });
            } else {
                alert("此瀏覽器不支援定位功能。");
            }
        }

        // 2. 將圖片轉換為 Base64 格式以利 API 傳輸
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]); // 移除 Data URI 標頭
                reader.onerror = error => reject(error);
            });
        }

        // 3. 提交表單資料至後端
        async function submitForm() {
            document.getElementById("status").innerText = "資料傳送中，請稍候...";
            
            const fileInput = document.getElementById("photoUpload").files[0];
            let photoBase64 = "";
            let photoName = "";
            
            if (fileInput) {
                photoBase64 = await getBase64(fileInput);
                photoName = fileInput.name;
            }

            const payload = {
                streamId: document.getElementById("streamId").value,
                investigator: document.getElementById("investigator").value,
                lat: lat,
                lng: lng,
                riskLevel: document.getElementById("riskLevel").value,
                photoBase64: photoBase64,
                photoName: photoName
            };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload) // GAS doPost 預設無法解析 application/json，需以純文字傳送
                });
                const result = await response.json();
                if(result.status === "success") {
                    document.getElementById("status").innerText = "回報成功！資料已寫入系統。";
                }
            } catch (error) {
                document.getElementById("status").innerText = "上傳失敗，請檢查網路連線。";
            }
        }
    </script>
</body>
</html>
