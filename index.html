<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>土石流潛勢溪流現勘系統 (地圖整合版)</title>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; box-sizing: border-box; }
        button { background-color: #0056b3; color: white; border: none; border-radius: 5px; margin-top: 5px; cursor: pointer; }
        #map { height: 300px; width: 100%; background-color: #eee; margin-top: 10px; border-radius: 5px; }
        #status { margin-top: 15px; color: green; font-weight: bold; }
        .flex-row { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <h2>土石流現勘回報表</h2>

    <div class="form-group">
        <label>目前定位 (WGS84)</label>
        <div class="flex-row">
            <input type="text" id="gpsData" readonly placeholder="尚未獲取座標">
            <button type="button" onclick="getGPS()" style="width: 40%; margin: 0;">目前位置</button>
        </div>
        <div id="map"></div>
        <small id="locationText" style="color: #666;"></small>
    </div>

    <div class="form-group">
        <label>溪流編號 (可選擇或手動輸入臨時編號)</label>
        <input list="streamIdList" id="streamId" placeholder="請輸入或選擇編號 (如: 高市DF019)">
        <datalist id="streamIdList">
            </datalist>
    </div>

    <div class="form-group">
        <label>現場照片 (若含 GPS 將自動更新地圖)</label>
        <input type="file" id="photoUpload" accept="image/*" capture="environment">
    </div>

    <button type="button" onclick="submitForm()">送出調查資料</button>
    <div id="status"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB_m91mDE1HSFIj-s-iiCsS9RvmVWgSl3E&callback=initSystem" async defer></script>

    <script>
        let map, marker, geocoder;
        let lat = 23.5, lng = 121.0; // 預設台灣中心點
        let allDebrisData = []; // 儲存從 JSON 抓取的所有溪流資料

        // 1. 系統初始化 (由 Google Maps 載入完成後觸發)
        async function initSystem() {
            // 載入地圖
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: lat, lng: lng },
                zoom: 7,
                mapTypeId: 'hybrid', // 衛星混合底圖
                streetViewControl: false // 隱藏街景按鈕節省空間
            });

            marker = new google.maps.Marker({
                position: { lat: lat, lng: lng },
                map: map,
                draggable: true
            });
            geocoder = new google.maps.Geocoder();

            // 載入 JSON 資料 (假設格式包含 Debrisno, County, Town, Vill)
            try {
                const response = await fetch('GetDebrisVillInfo.json');
                allDebrisData = await response.json();
                populateDropdown(allDebrisData); // 初始載入全台清單
            } catch (error) {
                console.error("載入 JSON 失敗，請確認檔案路徑", error);
            }

            // 綁定地圖點擊事件
            map.addListener('click', (e) => {
                updateLocation(e.latLng.lat(), e.latLng.lng());
            });

            // 綁定標記拖曳事件
            marker.addListener('dragend', (e) => {
                updateLocation(e.latLng.lat(), e.latLng.lng());
            });
            
            // 綁定照片上傳事件 (解析 EXIF)
            document.getElementById('photoUpload').addEventListener('change', handlePhotoUpload);
        }

        // 2. 更新座標、移動地圖並觸發地址解析
        function updateLocation(newLat, newLng) {
            lat = newLat;
            lng = newLng;
            const pos = { lat: lat, lng: lng };
            
            marker.setPosition(pos);
            map.panTo(pos);
            map.setZoom(16);
            document.getElementById("gpsData").value = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;

            // 進行逆向地理編碼，找出所屬村里
            reverseGeocode(pos);
        }

        // 3. 獲取手機當前 GPS
        function getGPS() {
            if (navigator.geolocation) {
                document.getElementById("gpsData").value = "定位中...";
                navigator.geolocation.getCurrentPosition(position => {
                    updateLocation(position.coords.latitude, position.coords.longitude);
                }, () => {
                    alert("無法獲取定位，請確認手機 GPS 權限。");
                });
            }
        }

        // 4. 照片上傳與 EXIF 解析
        async function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                // 使用 exifr 讀取照片內的 GPS 資訊
                const gps = await exifr.gps(file);
                if (gps && gps.latitude && gps.longitude) {
                    alert("已成功擷取照片 GPS 座標！地圖將自動移動。");
                    updateLocation(gps.latitude, gps.longitude);
                }
            } catch (err) {
                console.log("此照片無 GPS 資訊或解析失敗");
            }
        }

        // 5. 逆向地理編碼與選單智慧帶入
        function reverseGeocode(pos) {
            geocoder.geocode({ location: pos }, (results, status) => {
                if (status === "OK" && results[0]) {
                    const addressComponents = results[0].address_components;
                    let currentCounty = "", currentTown = "", currentVill = "";

                    // 解析 Google 回傳的行政區劃 (針對台灣地址結構調整)
                    addressComponents.forEach(comp => {
                        // 縣市 (Level 1 或 2)
                        if (comp.types.includes("administrative_area_level_1") || comp.types.includes("administrative_area_level_2")) {
                            currentCounty = comp.long_name;
                        }
                        // 鄉鎮市區 (Level 3 或 locality)
                        if (comp.types.includes("administrative_area_level_3") || comp.types.includes("locality")) {
                            currentTown = comp.long_name;
                        }
                        // 村里 (Level 4, sublocality 或 neighborhood)
                        if (comp.types.includes("administrative_area_level_4") || comp.types.includes("sublocality") || comp.types.includes("neighborhood")) {
                            currentVill = comp.long_name;
                        }
                    });

                    document.getElementById("locationText").innerText = `解析位置：${currentCounty} ${currentTown} ${currentVill}`;

                    // 【第一層篩選】嚴格比對：縣市 + 鄉鎮 + 村里
                    let filteredData = allDebrisData.filter(item => {
                        return item.County === currentCounty &&
                               item.Town === currentTown &&
                               item.Vill === currentVill;
                    });

                    // 【容錯機制】若該村里內查無資料 (可能是邊界誤差)，退回使用「鄉鎮」篩選
                    if (filteredData.length === 0) {
                        filteredData = allDebrisData.filter(item => {
                            return item.County === currentCounty && item.Town === currentTown;
                        });
                        document.getElementById("locationText").innerText += " (以鄉鎮範圍篩選)";
                    }

                    const streamInput = document.getElementById("streamId");

                    // 【自動帶入或更新選單邏輯】
                    if (filteredData.length > 0) {
                        // 更新 Datalist 只顯示篩選後的選項
                        populateDropdown(filteredData);
                        
                        if (filteredData.length === 1) {
                            // 狀況 A：該區域只有一條溪流 -> 直接自動帶入輸入框
                            streamInput.value = filteredData[0].Debrisno;
                            document.getElementById("locationText").innerText += ` ➔ 已自動帶入 ${filteredData[0].Debrisno}`;
                        } else {
                            // 狀況 B：該區域有多條溪流 -> 清空輸入框，提示使用者從縮減後的選單挑選
                            streamInput.value = ""; 
                            streamInput.placeholder = `請點擊選單 (${currentVill || currentTown} 內有 ${filteredData.length} 條)`;
                        }
                    } else {
                        // 狀況 C：完全找不到 (例如點到外海或深山無編號區) -> 恢復全台清單
                        populateDropdown(allDebrisData); 
                        streamInput.value = "";
                        streamInput.placeholder = "此區域查無既有溪流，請手動輸入臨時編號";
                    }
                }
            });
        }
        
        // 6. 更新 Datalist 下拉選項
        function populateDropdown(dataArray) {
            const dataList = document.getElementById("streamIdList");
            dataList.innerHTML = ""; // 清空舊選項
            
            dataArray.forEach(item => {
                // 假設您的 JSON 裡面有 Debrisno 欄位
                if(item.Debrisno) {
                    const option = document.createElement("option");
                    option.value = item.Debrisno;
                    // 可在選項後方加上村里名稱輔助辨識
                    option.text = `${item.County}${item.Town}${item.Vill || ''}`; 
                    dataList.appendChild(option);
                }
            });
        }

        // 7. 提交表單資料至後端 (與前次相同，此處簡略)
        async function submitForm() {
            const streamId = document.getElementById("streamId").value;
            if(!streamId) { alert("請輸入或選擇溪流編號"); return; }
            document.getElementById("status").innerText = "資料傳送中，請稍候...";
            // ... (接續先前的 Base64 與 fetch API 傳送邏輯) ...
        }
    </script>
</body>
</html>
