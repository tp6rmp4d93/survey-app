<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>土石流潛勢溪流現勘系統 (地圖整合版)</title>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; box-sizing: border-box; }
        button { background-color: #0056b3; color: white; border: none; border-radius: 5px; margin-top: 5px; cursor: pointer; }
        #map { height: 300px; width: 100%; background-color: #eee; margin-top: 10px; border-radius: 5px; }
        #status { margin-top: 15px; color: green; font-weight: bold; }
        .flex-row { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <h2>土石流現勘回報表</h2>

    <div class="form-group">
        <label>目前定位 (WGS84)</label>
        <div class="flex-row">
            <input type="text" id="gpsData" readonly placeholder="尚未獲取座標">
            <button type="button" onclick="getGPS()" style="width: 40%; margin: 0;">目前位置</button>
        </div>
        <div id="map"></div>
        <small id="locationText" style="color: #666;"></small>
    </div>

    <div class="form-group">
        <label>溪流編號 (可選擇或手動輸入臨時編號)</label>
        <input list="streamIdList" id="streamId" placeholder="請輸入或選擇編號 (如: 高市DF019)">
        <datalist id="streamIdList">
            </datalist>
    </div>

    <div class="form-group">
        <label>現場照片 (若含 GPS 將自動更新地圖)</label>
        <input type="file" id="photoUpload" accept="image/*" capture="environment">
    </div>

    <button type="button" onclick="submitForm()">送出調查資料</button>
    <div id="status"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB_m91mDE1HSFIj-s-iiCsS9RvmVWgSl3E&loading=async&libraries=marker&callback=initSystem" async defer></script>

    <script>
        let map, marker, geocoder;
        let lat = 23.5, lng = 121.0; 
        let allDebrisData = []; 

        // 1. 系統初始化 (已升級為 AdvancedMarkerElement)
        async function initSystem() {
            // 使用最新的 importLibrary 語法
            const { Map } = await google.maps.importLibrary("maps");
            const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
            const { Geocoder } = await google.maps.importLibrary("geocoding");

            map = new Map(document.getElementById("map"), {
                center: { lat: lat, lng: lng },
                zoom: 7,
                mapTypeId: 'hybrid',
                mapId: 'DEMO_MAP_ID', // 進階標記要求必須綁定 mapId
                streetViewControl: false
            });

            // 建立新版進階圖釘
            marker = new AdvancedMarkerElement({
                map: map,
                position: { lat: lat, lng: lng },
                gmpDraggable: true // 允許拖曳
            });

            geocoder = new Geocoder();

            try {
                const response = await fetch('GetDebrisVillInfo.json');
                allDebrisData = await response.json();
                populateDropdown(allDebrisData); 
            } catch (error) {
                console.error("載入 JSON 失敗", error);
            }

            // 綁定地圖點擊事件
            map.addListener('click', (e) => {
                updateLocation(e.latLng.lat(), e.latLng.lng());
            });

            // 綁定圖釘拖曳完成事件 (新版事件寫法略有不同)
            marker.addListener('dragend', (event) => {
                const position = marker.position;
                updateLocation(position.lat, position.lng);
            });
            
            document.getElementById('photoUpload').addEventListener('change', handlePhotoUpload);
        }

        // 2. 更新座標與地圖
        function updateLocation(newLat, newLng) {
            lat = parseFloat(newLat);
            lng = parseFloat(newLng);
            const pos = { lat: lat, lng: lng };
            
            marker.position = pos; // 新版圖釘更新位置的語法
            map.panTo(pos);
            map.setZoom(16);
            document.getElementById("gpsData").value = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;

            reverseGeocode(pos);
        }

        // 5. 逆向地理編碼 (使用正則表達式，徹底解決山區漏抓問題)
        function reverseGeocode(pos) {
            geocoder.geocode({ location: pos }, (results, status) => {
                if (status === "OK" && results[0]) {
                    // 直接取得完整地址，例如："848台灣高雄市桃源區勤和里南橫公路"
                    const address = results[0].formatted_address;
                    
                    // 清除郵遞區號與台灣字眼，剩下 "高雄市桃源區勤和里..."
                    const cleanStr = address.replace(/^[\d\s]+/, '').replace(/^台[灣湾]|臺[灣湾]/, '');

                    let currentCounty = "", currentTown = "", currentVill = "";
                    
                    // 正則萃取神技：精準切割出「縣市」、「鄉鎮市區」、「村里」
                    const match = cleanStr.match(/([^縣市]+[縣市])([^鄉鎮市區]+[鄉鎮市區])?([^村里]+[村里])?/);

                    if (match) {
                        currentCounty = match[1] || "";
                        currentTown = match[2] || "";
                        currentVill = match[3] || "";
                    }

                    // 統一臺台字元 (將 JSON 與 Google 統一為「台」以利比對)
                    const normalizeStr = (str) => str ? str.replace(/臺/g, "台") : "";
                    const nCounty = normalizeStr(currentCounty);
                    const nTown = normalizeStr(currentTown);
                    const nVill = normalizeStr(currentVill);

                    const locationString = `解析位置：${nCounty} ${nTown} ${nVill}`;
                    document.getElementById("locationText").innerText = locationString;

                    // 【第一層篩選】精準比對：縣市 + 鄉鎮 + 村里
                    let filteredData = allDebrisData.filter(item => {
                        if (!item.County || !item.Town) return false;
                        
                        let iCounty = normalizeStr(item.County);
                        let iTown = normalizeStr(item.Town);
                        let iVill = normalizeStr(item.Vill);

                        let matchCounty = nCounty.includes(iCounty) || iCounty.includes(nCounty);
                        let matchTown = nTown.includes(iTown) || iTown.includes(nTown);
                        let matchVill = (nVill && iVill) ? (nVill.includes(iVill) || iVill.includes(nVill)) : false;

                        return matchCounty && matchTown && matchVill;
                    });

                    // 【容錯機制】若村里查無資料，退回使用「鄉鎮」篩選
                    if (filteredData.length === 0) {
                        filteredData = allDebrisData.filter(item => {
                            if (!item.County || !item.Town) return false;
                            let iCounty = normalizeStr(item.County);
                            let iTown = normalizeStr(item.Town);
                            
                            let matchCounty = nCounty.includes(iCounty) || iCounty.includes(nCounty);
                            let matchTown = nTown.includes(iTown) || iTown.includes(nTown);
                            return matchCounty && matchTown;
                        });
                        document.getElementById("locationText").innerText += " (退回鄉鎮篩選)";
                    }

                    const streamInput = document.getElementById("streamId");

                    // 【選單自動帶入邏輯】
                    if (filteredData.length > 0) {
                        populateDropdown(filteredData);
                        
                        if (filteredData.length === 1) {
                            streamInput.value = filteredData[0].Debrisno;
                            document.getElementById("locationText").innerText += ` ➔ 已自動填入: ${filteredData[0].Debrisno}`;
                        } else {
                            streamInput.value = ""; 
                            streamInput.placeholder = `請點擊選單 (範圍內有 ${filteredData.length} 條)`;
                        }
                    } else {
                        populateDropdown(allDebrisData); 
                        streamInput.value = "";
                        streamInput.placeholder = "此區域查無既有溪流，請手動輸入";
                    }
                }
            });
        }
        
        // 6. 更新 Datalist 下拉選項
        function populateDropdown(dataArray) {
            const dataList = document.getElementById("streamIdList");
            dataList.innerHTML = ""; // 清空舊選項
            
            dataArray.forEach(item => {
                // 假設您的 JSON 裡面有 Debrisno 欄位
                if(item.Debrisno) {
                    const option = document.createElement("option");
                    option.value = item.Debrisno;
                    // 可在選項後方加上村里名稱輔助辨識
                    option.text = `${item.County}${item.Town}${item.Vill || ''}`; 
                    dataList.appendChild(option);
                }
            });
        }

        // 7. 提交表單資料至後端 (與前次相同，此處簡略)
        async function submitForm() {
            const streamId = document.getElementById("streamId").value;
            if(!streamId) { alert("請輸入或選擇溪流編號"); return; }
            document.getElementById("status").innerText = "資料傳送中，請稍候...";
            // ... (接續先前的 Base64 與 fetch API 傳送邏輯) ...
        }
    </script>
</body>
</html>
